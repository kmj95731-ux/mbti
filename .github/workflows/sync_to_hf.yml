name: Sync to HuggingFace

on:
  push:
    branches: [master, main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "kmj9573@jbnu.ac.kr"
          git config --global user.name "kmj95731-ux"
          git push https://minjin1:${HF_TOKEN}@huggingface.co/spaces/minjin1/mbti master:main --force
