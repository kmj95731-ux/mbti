<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI Book Talk — 같은 MBTI끼리 나누는 책이야기</title>
  <meta name="description" content="MBTI 성격 유형별 도서 추천 커뮤니티. 같은 유형끼리 책을 추천하고 이야기해요.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F9F9F1;--white:#fff;--dark:#2C2C2C;--gray:#888;--light:#F0F0E8;
  --green:#8DC487;--green-d:#6BAD65;
  --yellow:#FFB830;--yellow-d:#E8A020;
  --orange:#FF7043;--purple:#9C6FDE;--pink:#FF6B9D;
  --radius:18px;--radius-lg:26px;--radius-xl:50px;
  --shadow:0 4px 18px rgba(0,0,0,.10);--shadow-sm:0 2px 8px rgba(0,0,0,.07);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{border:none;cursor:pointer;font-family:inherit;background:none}
img{max-width:100%}

/* ── HEADER ── */
.site-header{
  background:var(--white);box-shadow:var(--shadow-sm);
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.header-logo{font-family:'Black Han Sans',sans-serif;font-size:1.3rem;display:flex;gap:3px;align-items:center}
.logo-m{color:var(--dark)}.logo-b{color:var(--orange)}.logo-t{color:var(--purple)}
.header-back{font-size:1.4rem;padding:4px 10px;border-radius:8px;color:var(--dark);transition:background .15s}
.header-back:hover{background:var(--light)}
.header-right{min-width:40px;display:flex;align-items:center;justify-content:flex-end}
.online-pill{
  display:inline-flex;align-items:center;gap:5px;
  background:#F0FFF4;border:1.5px solid #C8E6C9;border-radius:20px;
  padding:4px 10px;font-size:.72rem;font-weight:700;color:#2E7D32;white-space:nowrap;
}
.online-dot{width:7px;height:7px;border-radius:50%;background:#43A047;animation:pulse 1.5s ease-in-out infinite;flex-shrink:0}

/* ── PAGE WRAPPER ── */
.page{display:none;animation:fadeIn .22s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.inner{max-width:480px;margin:0 auto;padding:24px 20px 48px}

/* ── LANDING ── */
.landing-wrap{
  max-width:420px;margin:0 auto;min-height:calc(100vh - 60px);
  display:flex;flex-direction:column;align-items:center;
  padding:52px 28px 40px;position:relative;overflow:hidden;
}
.deco-shape{position:absolute;border-radius:50%;opacity:.18;pointer-events:none}
.shape-1{width:120px;height:120px;background:var(--yellow);top:-30px;right:-30px}
.shape-2{width:80px;height:80px;background:var(--green);bottom:200px;left:-20px}
.shape-3{width:60px;height:60px;background:var(--purple);top:160px;right:10px}
.shape-4{width:100px;height:100px;background:var(--orange);bottom:80px;right:-20px}

.logo-area{text-align:center;margin-bottom:8px;position:relative;z-index:1}
.logo-mbti{font-family:'Black Han Sans',sans-serif;font-size:3.4rem;color:var(--dark);display:block;letter-spacing:6px}
.logo-booktalk{display:flex;justify-content:center;gap:10px;margin-top:-6px}
.logo-book{font-family:'Black Han Sans',sans-serif;font-size:3.1rem;color:var(--orange)}
.logo-talk{font-family:'Black Han Sans',sans-serif;font-size:3.1rem;color:var(--purple)}

.subtitle-banner{
  background:var(--yellow);color:var(--white);font-weight:700;font-size:.97rem;
  padding:10px 28px;border-radius:var(--radius-xl);margin:18px 0 34px;
  box-shadow:0 4px 14px rgba(255,184,48,.4);position:relative;z-index:1;
}
.btn-bubble{
  background:var(--white);border-radius:var(--radius-lg);
  border:3px solid var(--dark);padding:26px 22px;width:100%;
  display:flex;flex-direction:column;gap:14px;
  position:relative;z-index:1;box-shadow:7px 7px 0 var(--dark);
}
.btn-bubble::after{
  content:'';position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);
  border:14px solid transparent;border-top-color:var(--dark);
}
.btn-bubble::before{
  content:'';position:absolute;bottom:-19px;left:50%;transform:translateX(-50%);
  border:11px solid transparent;border-top-color:var(--white);z-index:1;
}
.main-btn{
  display:flex;align-items:center;gap:14px;padding:18px 22px;
  border-radius:var(--radius-xl);font-weight:700;font-size:1.04rem;
  color:var(--white);box-shadow:0 4px 14px rgba(0,0,0,.14);
  transition:transform .15s,box-shadow .15s;cursor:pointer;
}
.main-btn:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.18)}
.btn-green{background:var(--green)}.btn-yellow{background:var(--yellow)}
.btn-icon{
  width:46px;height:46px;background:rgba(255,255,255,.28);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;
}
.btn-text{flex:1;line-height:1.4}
.btn-line1{display:block;font-size:.82rem;opacity:.85;margin-bottom:1px}
.btn-line2{display:block;font-size:.85rem;font-weight:900}
.btn-arr{font-size:1.5rem;font-weight:900;opacity:.7}

/* ── HERO BANDS ── */
.hero-band{
  padding:36px 24px 30px;text-align:center;color:var(--white);
  border-radius:0 0 28px 28px;margin-bottom:0;
}
.hero-icon{font-size:3.2rem;margin-bottom:12px}
.hero-title{font-family:'Black Han Sans',sans-serif;font-size:1.75rem;margin-bottom:8px}
.hero-sub{font-size:.9rem;opacity:.9;line-height:1.55}

/* ── TABS ── */
.tab-bar{
  display:flex;background:var(--white);
  border-bottom:2px solid var(--light);
  position:sticky;top:60px;z-index:50;
}
.tab{
  flex:1;padding:14px 4px;text-align:center;font-size:.86rem;font-weight:700;
  color:#aaa;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;
}
.tab.active{color:var(--dark);border-bottom-color:var(--green)}

/* ── TYPE SWITCHER ── */
.type-switch{
  display:flex;gap:8px;overflow-x:auto;
  padding:12px 20px 4px;background:var(--white);
  border-bottom:1px solid var(--light);scrollbar-width:none;
}
.type-switch::-webkit-scrollbar{display:none}
.type-pill{
  padding:6px 14px;border-radius:30px;font-size:.8rem;font-weight:700;
  white-space:nowrap;cursor:pointer;border:2px solid var(--light);
  background:var(--white);color:var(--gray);transition:all .18s;flex-shrink:0;
}
.type-pill.active{color:var(--white);border-color:transparent}

/* ── CARDS ── */
.book-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:28px}
.book-card{
  background:var(--white);border-radius:var(--radius);overflow:hidden;cursor:pointer;
  box-shadow:var(--shadow-sm);transition:transform .15s,box-shadow .15s;
}
.book-card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.rank-badge{
  position:absolute;top:6px;left:6px;width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:900;z-index:2;
}
.rank-badge.gold{background:linear-gradient(135deg,#FFD700,#FFA500);color:white;box-shadow:0 2px 8px rgba(255,184,0,.5)}
.rank-badge.silver{background:linear-gradient(135deg,#C0C0C0,#A0A0A0);color:white;box-shadow:0 2px 8px rgba(160,160,160,.4)}
.rank-badge.bronze{background:linear-gradient(135deg,#CD7F32,#A0522D);color:white;box-shadow:0 2px 8px rgba(160,80,30,.4)}
.rank-badge.normal{background:rgba(0,0,0,.5);color:white}
.type-participants{
  display:inline-flex;align-items:center;gap:3px;
  margin:0 auto 7px;padding:2px 8px;border-radius:12px;
  font-size:.67rem;font-weight:700;line-height:1.3;
}
.cover-wrap{width:100%;aspect-ratio:3/4;background:var(--light);overflow:hidden;position:relative}
.cover-img{width:100%;height:100%;object-fit:cover;display:block}
.cover-ph{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:3rem;background:linear-gradient(135deg,#F0F0E8,#E8E8D8);
}
.book-info{padding:11px 12px 14px}
.book-title{
  font-weight:700;font-size:.83rem;line-height:1.4;margin-bottom:4px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.book-author{font-size:.73rem;color:var(--gray);margin-bottom:8px}
.book-foot{display:flex;align-items:center;justify-content:space-between}
.hbtn{
  display:flex;align-items:center;gap:3px;font-size:1rem;
  color:#ccc;transition:transform .2s;padding:2px;
}
.hbtn:hover{transform:scale(1.3)}.hbtn.hearted{color:var(--pink)}
.hcnt{font-size:.78rem;color:var(--gray)}
.badge{font-size:.67rem;padding:3px 8px;border-radius:10px;font-weight:700}
.badge-cur{background:#F0FFF4;color:#27AE60}.badge-usr{background:#FFF0F5;color:var(--pink)}
.reason-snip{
  font-size:.72rem;color:#777;font-style:italic;margin-top:8px;
  border-top:1px solid var(--light);padding-top:7px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}

/* ── MBTI SELECT GRID ── */
.group-section{margin-bottom:22px}
.group-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:12px;
}
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.type-card{
  background:var(--white);border-radius:var(--radius);padding:10px 6px 0;
  text-align:center;cursor:pointer;box-shadow:var(--shadow-sm);
  border:2px solid transparent;transition:all .18s;overflow:hidden;
}
.type-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
.type-card.selected{box-shadow:4px 4px 0 var(--sel-c,#888);border-color:var(--sel-c,#888)}
.type-code{font-family:'Black Han Sans',sans-serif;font-size:1.05rem;margin-bottom:2px}
.type-name{font-size:.62rem;color:var(--gray);margin-bottom:6px}
.type-char{display:block;width:100%;line-height:0}
.type-char svg{width:100%;height:auto;display:block;border-radius:0 0 calc(var(--radius) - 2px) calc(var(--radius) - 2px)}

.sel-preview{
  background:var(--white);border-radius:var(--radius);padding:18px 20px;
  box-shadow:var(--shadow-sm);margin-bottom:20px;
  display:none;align-items:center;gap:16px;border-left:4px solid var(--green);
}
.sel-preview.on{display:flex}
.sel-badge{
  width:56px;height:56px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;color:var(--white);
  font-family:'Black Han Sans',sans-serif;font-size:.95rem;flex-shrink:0;
}
.sel-info h3{font-weight:700;font-size:.97rem;margin-bottom:3px}
.sel-info p{font-size:.82rem;color:var(--gray)}
.go-btn{
  display:block;width:100%;margin-top:22px;padding:16px;
  background:var(--green);color:var(--white);font-size:1.1rem;font-weight:700;
  border-radius:var(--radius-xl);text-align:center;
  box-shadow:0 4px 16px rgba(141,196,135,.4);transition:all .18s;
  opacity:.5;pointer-events:none;
}
.go-btn.ready{opacity:1;pointer-events:all}.go-btn.ready:hover{background:var(--green-d)}

/* ── TYPE ROOM HERO ── */
.room-hero{
  padding:30px 24px 26px;text-align:center;color:var(--white);position:relative;overflow:hidden;
}
.room-hero-bg{
  position:absolute;font-size:9rem;opacity:.1;top:50%;left:50%;
  transform:translate(-50%,-50%);pointer-events:none;
}
.room-type{font-family:'Black Han Sans',sans-serif;font-size:3rem;position:relative}
.room-korean{font-size:1rem;opacity:.9;margin-bottom:10px;position:relative}
.room-traits{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;position:relative}
.trait{background:rgba(255,255,255,.25);padding:4px 12px;border-radius:20px;font-size:.76rem;font-weight:700}
.room-stats{display:flex;justify-content:center;gap:34px;position:relative}
.stat-n{font-size:1.5rem;font-weight:900}.stat-l{font-size:.73rem;opacity:.8}
.live-dot-wrap{margin-top:10px;position:relative}
.live-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.18);padding:4px 14px;border-radius:20px;font-size:.74rem;font-weight:700;
}
.live-dot{width:7px;height:7px;border-radius:50%;background:#7FFF7F;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

/* ── SEARCH ── */
.search-row{display:flex;gap:10px;margin-bottom:16px}
.comm-search-row{display:flex;gap:10px;margin-bottom:14px}
.s-input{
  flex:1;padding:13px 18px;border:2px solid var(--light);border-radius:var(--radius-xl);
  font-family:inherit;font-size:.93rem;outline:none;background:var(--white);transition:border-color .2s;
}
.s-input:focus{border-color:var(--green)}
.s-btn{
  padding:13px 18px;background:var(--green);color:var(--white);border-radius:var(--radius-xl);
  font-weight:700;font-size:.93rem;white-space:nowrap;transition:background .2s;
}
.s-btn:hover{background:var(--green-d)}
.s-item{
  background:var(--white);border-radius:var(--radius);padding:13px;
  display:flex;gap:13px;box-shadow:var(--shadow-sm);
  border:2px solid transparent;transition:border-color .2s,transform .15s;margin-bottom:10px;
}
.s-item:hover{border-color:var(--green);transform:translateX(3px)}
.s-cover{width:54px;height:74px;object-fit:cover;border-radius:8px;background:var(--light);flex-shrink:0}
.s-info{flex:1;min-width:0}
.s-title{font-weight:700;font-size:.86rem;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-author{font-size:.77rem;color:var(--gray);margin-bottom:3px}
.s-pub{font-size:.72rem;color:#aaa}
.add-btn{
  padding:8px 13px;background:var(--yellow);color:var(--white);
  border-radius:12px;font-size:.77rem;font-weight:700;align-self:center;flex-shrink:0;
  transition:background .2s;
}
.add-btn:hover{background:var(--yellow-d)}.add-btn:disabled{background:#C8E6C9;cursor:default}
.srch-pager{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:14px;padding-top:10px;border-top:1px solid var(--light)}
.srch-page-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--light);background:var(--white);font-size:.85rem;font-weight:700;cursor:pointer;color:var(--gray);transition:all .15s}
.srch-page-btn:hover{border-color:var(--yellow);color:var(--yellow-d)}
.srch-page-btn.active{background:var(--yellow);border-color:var(--yellow);color:var(--white)}
.s-filter{
  padding:13px 10px;border:2px solid var(--light);border-radius:var(--radius-xl);
  font-family:inherit;font-size:.82rem;outline:none;background:var(--white);
  color:var(--dark);cursor:pointer;transition:border-color .2s;flex-shrink:0;
}
.s-filter:focus{border-color:var(--green)}

/* ── REC FORM ── */
.rec-form{
  background:var(--white);border-radius:var(--radius-lg);padding:22px;
  box-shadow:var(--shadow-sm);margin:14px 0 24px;border-left:4px solid var(--green);display:none;
}
.rec-preview{background:var(--bg);border-radius:14px;padding:13px;display:flex;gap:12px;margin-bottom:14px}
.pr-cover{width:42px;height:58px;object-fit:cover;border-radius:6px;background:var(--light)}
.pr-title{font-weight:700;font-size:.83rem;margin-bottom:3px}
.pr-author{font-size:.76rem;color:var(--gray)}
.form-lbl{font-size:.81rem;font-weight:700;color:var(--gray);margin-bottom:6px;display:block}
.form-ta{
  width:100%;padding:11px 15px;border:2px solid var(--light);border-radius:14px;
  font-family:inherit;font-size:.88rem;resize:none;height:76px;outline:none;margin-bottom:12px;
}
.form-ta:focus{border-color:var(--green)}
.form-sub{
  width:100%;padding:13px;background:var(--green);color:var(--white);
  border-radius:var(--radius-xl);font-weight:700;font-size:.97rem;transition:background .2s;
}
.form-sub:hover{background:var(--green-d)}.form-sub:disabled{background:#ccc;cursor:default}

/* ── BOOK DETAIL ── */
.detail-hero{
  display:flex;gap:18px;align-items:flex-start;
  padding:26px 20px 22px;background:linear-gradient(180deg,#EDFAEC,var(--bg));
  border-bottom:2px solid var(--light);margin-bottom:22px;
}
.detail-cover-wrap{
  width:112px;height:160px;border-radius:11px;overflow:hidden;
  box-shadow:0 8px 22px rgba(0,0,0,.17);background:var(--light);
  display:flex;align-items:center;justify-content:center;font-size:3rem;flex-shrink:0;
}
.detail-cover{width:100%;height:100%;object-fit:cover;display:block}
.detail-title{font-family:'Black Han Sans',sans-serif;font-size:1.1rem;line-height:1.4;margin-bottom:7px}
.detail-author{font-size:.84rem;color:var(--gray);margin-bottom:4px}
.detail-pub{font-size:.78rem;color:#aaa;margin-bottom:13px}
.heart-big{
  display:inline-flex;align-items:center;gap:6px;
  border:2px solid var(--pink);border-radius:30px;padding:8px 16px;
  color:var(--pink);font-size:.88rem;font-weight:700;transition:all .2s;
}
.heart-big.hearted{background:var(--pink);color:var(--white)}
.heart-big:hover{transform:scale(1.04)}

.link-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.lib-link{
  display:flex;flex-direction:column;align-items:center;gap:5px;padding:13px 6px;
  border-radius:var(--radius);font-size:.74rem;font-weight:700;color:var(--white);text-align:center;
  transition:opacity .2s,transform .15s;
}
.lib-link:hover{opacity:.85;transform:translateY(-2px)}
.ll-icon{font-size:1.5rem}
.ll-aladin{background:linear-gradient(135deg,#FF7043,#E64A19)}
.ll-google{background:linear-gradient(135deg,#9C6FDE,#7B4FBE)}

.sec-card{background:var(--white);border-radius:var(--radius-lg);padding:22px;box-shadow:var(--shadow-sm);margin-bottom:18px}
.sec-title{font-family:'Black Han Sans',sans-serif;font-size:1.05rem;margin-bottom:13px}
.desc-text{font-size:.88rem;line-height:1.75;color:#555}

/* ── REASON BOX ── */
.reason-box{
  background:linear-gradient(135deg,#FFF8E7,#FFF3D0);border-radius:14px;padding:14px 16px;
  margin-bottom:16px;border-left:4px solid var(--yellow);
}
.reason-label{font-size:.75rem;font-weight:700;color:var(--yellow-d);margin-bottom:5px}
.reason-text{font-size:.85rem;color:#555;line-height:1.6}

/* ── REVIEWS ── */
.rev-form{background:var(--bg);border-radius:14px;padding:16px;margin-bottom:14px}
.rev-form-t{font-weight:700;font-size:.93rem;margin-bottom:11px}
.rev-ta{
  width:100%;padding:11px 15px;border:2px solid #E8E8D8;border-radius:13px;
  font-family:inherit;font-size:.88rem;resize:none;height:70px;outline:none;
  background:var(--white);margin-bottom:10px;display:block;
}
.rev-ta:focus{border-color:var(--green)}
.rev-sub{padding:9px 20px;background:var(--green);color:var(--white);border-radius:28px;font-size:.88rem;font-weight:700;transition:background .2s}
.rev-sub:hover{background:var(--green-d)}.rev-sub:disabled{background:#ccc;cursor:default}
.rev-item{background:var(--white);border-radius:14px;padding:14px 16px;margin-bottom:11px;box-shadow:var(--shadow-sm)}
.rev-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.rev-mbti{display:inline-block;padding:3px 11px;border-radius:18px;font-size:.76rem;font-weight:700;color:var(--white)}
.rev-date{font-size:.76rem;color:#aaa}
.rev-text{font-size:.86rem;line-height:1.65;color:#444}

.step-body a{color:var(--orange);text-decoration:underline}
.code-block{
  background:#1E1E2E;color:#CDD6F4;padding:14px 16px;border-radius:13px;
  font-family:'Courier New',monospace;font-size:.79rem;line-height:1.7;margin:11px 0;overflow-x:auto;white-space:pre;
}
.hl{color:#A6E3A1}.cm{color:#6C7086}
.warn-box{background:#FFF8E7;border-radius:13px;padding:14px;border-left:4px solid var(--yellow);font-size:.83rem;line-height:1.6;margin-top:11px}

/* ── TEST PAGE ── */
.age-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
.age-card{
  background:var(--white);border-radius:var(--radius);padding:18px 10px;text-align:center;
  cursor:pointer;box-shadow:var(--shadow-sm);border:3px solid transparent;transition:all .2s;
}

<script>
/* ══════════════════════════════════════════
   DB — localStorage only
   ══════════════════════════════════════════ */
async function addRec(type, book, review) {
  const rec = { title:book.title||'', author:book.author||'', isbn:book.isbn||'', cover:book.cover||'',
    publisher:book.publisher||'', review:review||'', hearts:0, userKey:getUserKey(),
    createdAt:new Date().toISOString() };
  const l=lsGet('recs_'+type,[]); l.unshift({...rec,id:Date.now()+''}); lsSet('recs_'+type,l);
  recordParticipation(type);
}

function subscribeRecs(type, cb) {
  cb(lsGet('recs_'+type,[]));
  return ()=>{};
}

async function toggleRecHeart(type, docId, hearted) {
  const lk='ht_r_'+type+'_'+docId;
  const nowHearted = !hearted;
  lsSet(lk, nowHearted);
  const recs = lsGet('recs_'+type, []);
  const rec = recs.find(r => r.id === docId);
  if (rec) {
    rec.hearts = Math.max(0, (rec.hearts||0) + (nowHearted ? 1 : -1));
    lsSet('recs_'+type, recs);
  }
  return nowHearted;
}

function subscribeReviews(bkey, cb) {
  cb(lsGet('rev_'+bkey,[]));
  return ()=>{};
}

async function addReview(bkey, text, mbti) {
  const r={text,mbti:mbti||'MBTI',userKey:getUserKey(),dateStr:new Date().toLocaleDateString('ko-KR'),
    createdAt:new Date().toISOString()};
  const l=lsGet('rev_'+bkey,[]); l.unshift({...r,id:Date.now()+''}); lsSet('rev_'+bkey,l);
}

function bkey(isbn, title) { return (isbn||title||'x').replace(/[^a-zA-Z0-9가-힣]/g,'_').slice(0,80); }

/* ══════════════════════════════════════════
   API — ALADIN + GOOGLE BOOKS
   ══════════════════════════════════════════ */
const ALADIN_KEY = 'ttbpopi07062229002';

function aladinSearch(q, queryType, start, maxResults) {
  queryType = queryType || 'Keyword';
  start = start || 1;
  maxResults = maxResults || 50;
  return new Promise(res => {
    const cb='al_'+queryType.slice(0,1)+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    let done=false;
    window[cb]=d=>{done=true;delete window[cb];
      res((d.item||[]).map(b=>({title:b.title,author:b.author,publisher:b.publisher||'',
        isbn:b.isbn13||b.isbn||'',cover:(b.cover||'').replace('coversum','cover200'),
        link:b.link||'',desc:b.description||'',source:'aladin'})));
    };
    const s=document.createElement('script');
    s.src=`https://www.aladin.co.kr/ttb/api/ItemSearch.aspx?ttbkey=${ALADIN_KEY}&Query=${encodeURIComponent(q)}&QueryType=${queryType}&MaxResults=${maxResults}&start=${start}&SearchTarget=Book&output=js&Version=20131101&CallBack=${cb}`;
    s.onerror=()=>{if(!done)res([])};
    document.head.appendChild(s);
    setTimeout(()=>{if(!done){done=true;res([])}},7000);
  });

async function googleSearch(q) {
  try {
    const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&langRestrict=ko&maxResults=40`);
    const d=await r.json();
    return (d.items||[]).map(v=>{
      const i=v.volumeInfo;
      return {title:i.title||'',author:(i.authors||[]).join(', '),publisher:i.publisher||'',
        isbn:((i.industryIdentifiers||[]).find(x=>x.type==='ISBN_13')||{}).identifier||'',
        cover:(i.imageLinks?.thumbnail||'').replace('http://','https://'),
        link:i.infoLink||'',desc:i.description||'',source:'google'};
    });
  } catch { return []; }
}

function _bookRelevance(book, q) {
  const title = (book.title || '').toLowerCase();
  const author = (book.author || '').toLowerCase();
  const query = q.toLowerCase().trim();
  const words = query.split(/\s+/).filter(w => w.length > 0);
  if (!words.length) return 0;
  if (title === query) return 1000;
  if (title.startsWith(query)) return 800;
  if (title.includes(query)) return 600;
  const titleMatches = words.filter(w => title.includes(w)).length;
  const authorMatches = words.filter(w => author.includes(w)).length;
  return (titleMatches / words.length) * 400 + (authorMatches / words.length) * 100;
}

async function searchBooks(q, filterType) {
  filterType = filterType || 'all';
  const url = `/api/book-search?q=${encodeURIComponent(q)}&filter_type=${filterType}&max_results=80`;
  let lastErr = '';
  try {
    const r = await fetch(url);
    if (!r.ok) { lastErr = `HTTP ${r.status}`; throw new Error(lastErr); }
    const data = await r.json();
    const out = data.books || [];
    if (out.length > 0) {
      out.sort((a, b) => _bookRelevance(b, q) - _bookRelevance(a, q));
      return out;
    }
    lastErr = 'empty';
  } catch(e) {
    lastErr = lastErr || e.message;
    console.warn('[searchBooks] 백엔드 실패:', lastErr);
  }
  // 백엔드 실패 시 빈 배열 반환 (에러 메시지는 doSearch에서 표시)
  window._lastSearchErr = lastErr;
  return [];
}

/* 표지 URL 캐시 (query → url) */
const _coverCache = {};

async function getCover(query, isbn) {
  const cacheKey = query || isbn;
  if (_coverCache[cacheKey] !== undefined) return _coverCache[cacheKey];

  let url = '';

  /* 1순위: Aladin 키워드 검색 — 제목+저자 → 한국 도서 표지 정확도 최고 */
  if (query && !url) {
    url = await _aladinCoverByQuery(query);
  }

  /* 2순위: Aladin ItemLookUp — ISBN 직접 조회 (query 없을 때) */
  if (isbn && !url) {
    url = await _aladinCoverByIsbn(isbn);
  }

  /* 3순위: Google Books — ISBN 검색 */
  if (isbn && !url) {
    try {
      const r = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}&maxResults=1`);
      const d = await r.json();
      const img = d.items?.[0]?.volumeInfo?.imageLinks?.thumbnail;
      if (img) url = img.replace('http://','https://').replace('zoom=1','zoom=0');
    } catch {}
  }

  /* 4순위: Open Library — ISBN 표지 (1px GIF 여부 검증) */
  if (isbn && !url) {
    const ol = `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg`;
    if (await _imgOk(ol)) url = ol;
  }

  /* 5순위: Google Books — 키워드 검색 */
  if (!url && query) {
    try {
      const r = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&langRestrict=ko&maxResults=5`);
      const d = await r.json();
      for (const item of (d.items || [])) {
        const img = item.volumeInfo?.imageLinks?.thumbnail;
        if (img) { url = img.replace('http://','https://').replace('zoom=1','zoom=0'); break; }
      }
    } catch {}
  }

  _coverCache[cacheKey] = url;
  return url;
}

/* Aladin Search JSONP — 키워드로 첫 번째 결과 표지 반환 */
function _aladinCoverByQuery(query) {
  return new Promise(resolve => {
    const cb = '_acs_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
    const s = document.createElement('script');
    const t = setTimeout(() => { resolve(''); s.remove(); try{delete window[cb];}catch{} }, 5000);
    window[cb] = data => {
      clearTimeout(t); s.remove(); try{delete window[cb];}catch{}
      const cover = data?.item?.[0]?.cover;
      resolve(cover ? cover.replace('coversum','cover200') : '');
    };
    s.onerror = () => { clearTimeout(t); resolve(''); try{delete window[cb];}catch{} };
    s.src = `https://www.aladin.co.kr/ttb/api/ItemSearch.aspx?ttbkey=${ALADIN_KEY}&Query=${encodeURIComponent(query)}&QueryType=Keyword&MaxResults=1&start=1&SearchTarget=Book&output=js&Version=20131101&CallBack=${cb}`;
    document.head.appendChild(s);
  });
}

/* Aladin ItemLookUp JSONP — ISBN으로 표지 반환 */
function _aladinCoverByIsbn(isbn) {
  return new Promise(resolve => {
    const cb = '_aci_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
    const s = document.createElement('script');
    const t = setTimeout(() => { resolve(''); s.remove(); try{delete window[cb];}catch{} }, 5000);
    window[cb] = data => {
      clearTimeout(t); s.remove(); try{delete window[cb];}catch{}
      const cover = data?.item?.[0]?.cover;
      resolve(cover ? cover.replace('coversum','cover200') : '');
    };
    s.onerror = () => { clearTimeout(t); resolve(''); try{delete window[cb];}catch{} };
    s.src = `https://www.aladin.co.kr/ttb/api/ItemLookUp.aspx?ttbkey=${ALADIN_KEY}&itemIdType=ISBN13&ItemId=${isbn}&output=js&Version=20131101&CallBack=${cb}`;
    document.head.appendChild(s);
  });
}

/* 이미지 URL 유효성 검사 (Open Library 1px GIF 걸러내기) */
function _imgOk(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img.naturalWidth > 5);
    img.onerror = () => resolve(false);
    img.src = url;
  });
}

function aladinUrl(isbn,title){return isbn?`https://www.aladin.co.kr/shop/wproduct.aspx?ISBN=${isbn}`:`https://www.aladin.co.kr/search/wsearchresult.aspx?SearchTarget=Book&query=${encodeURIComponent(title)}`;}
function googleUrl(title,author){return `https://books.google.com/books?q=${encodeURIComponent(title+' '+author)}`;}

function curRender(data) {

  const topRecs = books.slice(0, 6);

    html += `<div class="cur-saseo-grid" id="curRecGrid">`;
    topRecs.forEach((b, i) => {
      const aladinHref = `https://www.aladin.co.kr/search/wsearchresult.aspx?SearchWord=${encodeURIComponent(b.title)}`;
      html += `<a class="cur-rec-card" href="${_e(b.detail_link||aladinHref)}" target="_blank" rel="noopener" style="text-decoration:none;display:block" id="curRecCard${i}">
        <div class="cur-rec-ph" id="curRecPh${i}">📖</div>
        <div class="cur-rec-body">
          <div class="cur-rec-title">${_e(b.title)}</div>
          <div class="cur-rec-author">${_e(b.author)}</div>
          <span class="cur-rec-cat">${_e(b.kdc_name&&b.kdc_name!=='-'?b.kdc_name:kdc.name)}</span>
        </div>
      </a>`;
    });
    html += `</div>`;
  } else {
    html += `<div style="text-align:center;padding:28px;color:var(--gray);background:var(--white);border-radius:12px;margin-bottom:8px">검색 결과가 없습니다</div>`;
  }
  html += `<div class="cur-section-title">🔍 소장자료 검색결과
    <span class="cur-total">${pg.total?pg.total.toLocaleString()+'건':''}</span>
  </div>`;
  books.forEach(b => {
    const href = b.detail_link||'#';
    html += `<a class="cur-search-item" href="${_e(href)}" target="_blank" rel="noopener">
      <div class="cur-si-title">${_e(b.title)}</div>
      <div class="cur-si-meta">
        <span>${_e(b.author)}</span>
        <span>${_e(b.publisher)}</span>
        <span>${_e(b.year)}</span>
      </div>
      ${b.kdc_name&&b.kdc_name!=='-'?`<span class="cur-si-kdc">${_e(b.kdc_name)}</span>`:''}
    </a>`;
  });

  // 페이지네이션
  if(pg.total_pages > 1) {
    const W=5, half=Math.floor(W/2);
    let s=Math.max(1,pg.page-half), en=Math.min(pg.total_pages,s+W-1);
    if(en-s<W-1) s=Math.max(1,en-W+1);
    html += `<div class="cur-pagination">
      <button class="cur-pg-btn" onclick="curGoPage(${pg.page-1})" ${pg.page<=1?'disabled':''}>‹</button>`;
    for(let p=s;p<=en;p++) html+=`<button class="cur-pg-btn${p===pg.page?' active':''}" onclick="curGoPage(${p})">${p}</button>`;
    html += `<button class="cur-pg-btn" onclick="curGoPage(${pg.page+1})" ${pg.page>=pg.total_pages?'disabled':''}>›</button>
    </div>`;
  }

  body.innerHTML = html;

  // 추천도서 표지 비동기 로드
  topRecs.forEach((b, i) => {
    const query = `${b.title} ${b.author}`;

      img.loading = 'lazy';
      img.onerror = () => img.remove();
      ph.replaceWith(img);
    });
  });

    btn.disabled = false;
    btn.textContent = '🔄 DB 수집 시작';
  }
}

function libPollCrawl() {
  if(LIB.pollTimer) clearInterval(LIB.pollTimer);
  LIB.pollTimer = setInterval(async () => {
    try {
      const res = await fetch(`${LIB.API_BASE}/api/crawl/status`);
      const d = await res.json();
      const msgEl = document.getElementById('libProgressMsg');
      const fillEl = document.getElementById('libProgressFill');
      const boxEl  = document.getElementById('libProgressBox');
      if(msgEl) msgEl.textContent = d.message || '';
      if(fillEl && d.total > 0) fillEl.style.width = Math.round(d.done/d.total*100)+'%';
      if(!d.crawl_running) {
        clearInterval(LIB.pollTimer);
        libCheckStatus();
      }
    } catch(e) { clearInterval(LIB.pollTimer); }
  }, 2500);
}

function libQuick(q) {
  const ta = document.getElementById('libInput');

async function libAsk(e) {
  if(e) e.preventDefault();
  const ta = document.getElementById('libInput');
  const query = ta ? ta.value.trim() : '';
  if(!query) return;

  const body = document.getElementById('libBody');
  const btn  = document.getElementById('libSubmitBtn');
  if(!body) return;

  body.innerHTML=`<div class="lib-loading"><div class="spinner"></div><p>사서가 자료를 찾는 중...</p></div>`;
  if(btn) btn.disabled = true;

  try {
    const res = await fetch(`${LIB.API_BASE}/api/librarian/ask`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({query, top_k: 8}),
      signal: AbortSignal.timeout(30000),
    });
    if(!res.ok) throw new Error(`서버 오류 (${res.status})`);
    const data = await res.json();
    libRender(data);
  } catch(err) {
    const isConn = err.name==='TypeError'||err.name==='AbortError';
    const isLocal = window.location.hostname === 'localhost'
                 || window.location.hostname === '127.0.0.1'
                 || window.location.protocol === 'file:';
    const connMsg = isLocal
      ? '로컬 서버가 실행 중인지 확인해 주세요.<br><code style="background:#FEF3C7;padding:4px 8px;border-radius:6px;font-size:.8rem">cd ~/mbtibooktalk/server && ./run.sh</code>'
      : '사서 응답 서버에 일시적인 문제가 발생하였습니다. 잠시 후 다시 시도해 주시기 바랍니다.';
    body.innerHTML=`<div class="lib-crawl-card">
      <div class="lib-crawl-title">${isConn?'⚠️ 서버 연결 실패':'⚠️ 오류 발생'}</div>
      <div class="lib-crawl-desc">${isConn ? connMsg : _e(err.message)}</div>
    </div>`;
  } finally {
    if(btn) btn.disabled = false;
  }
}

async function libFeedback(helpful, query, tier, topScore, normScore) {
  try {
    await fetch(`${LIB.API_BASE}/api/librarian/feedback`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        query, response_tier: tier,
        top_score: topScore, norm_score: normScore,
        helpful
      })
    });
  } catch(e) { /* 피드백 실패는 조용히 무시 */ }
  const area = document.getElementById('lib-feedback-area');
  if (area) {
    area.innerHTML = `
      <span style="font-size:.85rem;color:#059669;font-weight:600">피드백 감사합니다. 🙏</span>
      <button onclick="libGoBack()"
        style="margin-left:8px;font-size:.78rem;padding:4px 14px;border-radius:20px;
               border:1px solid #6B7280;background:#F9FAFB;color:#374151;cursor:pointer">
        ↩ 다시 돌아가기
      </button>`;
  }
}

function libGoBack() {
  const ta = document.getElementById('libInput');
  if (ta) {
    ta.value = '';
    ta.focus();
    ta.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  const body = document.getElementById('libBody');
  if (body) body.innerHTML = '';
}

/* 큐레이션 하트(htc_* 누적) + 커뮤니티 하트(recs) 합산 */
function calcTotalHearts(type, communityBooks) {
  const community = communityBooks.reduce((s,b)=>s+(b.hearts||0), 0);
  const curated = (MBTI_DATA[type]?.books||[]).reduce((s,b)=>{
    return s + lsGet('htc_'+(b.isbn||b.title||''), 0);
  }, 0);
  return community + curated;
}

/* ── 커뮤니티 자연어 검색 (TF-IDF 스코어링) ── */
function _tokenize(text) {
  return (text||'').toLowerCase()
    .replace(/[^가-힣ᄀ-ᇿ㄰-㆏a-z0-9\s]/g,' ')
    .split(/\s+/).filter(t=>t.length>0);
}
function _score(doc, queryTokens) {
  const fields = [doc.title||'', doc.author||'', doc.review||'', doc.publisher||''];
  const docText = fields.join(' ');
  const docTokens = _tokenize(docText);
  if(!docTokens.length) return 0;
  let score = 0;
  queryTokens.forEach(qt=>{
    const tf = docTokens.filter(t=>t.includes(qt)).length / docTokens.length;
    const titleBonus = _tokenize(doc.title||'').some(t=>t.includes(qt)) ? 2 : 0;
    const authorBonus = _tokenize(doc.author||'').some(t=>t.includes(qt)) ? 1 : 0;
    score += (tf * 10) + titleBonus + authorBonus;
  });
  return score;
}
let _allCommBooks = [];
function doCommSearch() {
  const q = (document.getElementById('commSearchInput')?.value||'').trim();
  if(!q) { resetCommSearch(); return; }
  const queryTokens = _tokenize(q);
  if(!queryTokens.length) return;
  const books = lsGet('recs_'+state.type, []);
  _allCommBooks = books;
  const scored = books
    .map(b=>({b, s:_score(b, queryTokens)}))
    .filter(x=>x.s>0)
    .sort((a,z)=>z.s-a.s)
    .map(x=>x.b);
  const wrap = document.getElementById('communityContent');
  if(!wrap) return;
  if(!scored.length){
    wrap.innerHTML=`<div class="empty-box"><div class="empty-icon">🔍</div><div class="empty-text">"${q}"에 해당하는 추천 도서가 없어요.</div></div>`;
    return;
  }
  const grid=document.createElement('div');
  grid.className='book-grid';
  scored.forEach((b,i)=>{
    const card=makeCard(b,'user',b.id||String(i));
    grid.appendChild(card);
    if(b.cover){const img=card.querySelector('img.cover-img');if(img)img.src=b.cover;}
    else fetchCover(card.querySelector('.cover-wrap'),b.isbn,b.title);
  });
  wrap.innerHTML=`<div style="font-size:.82rem;color:var(--gray);margin-bottom:10px">"${q}" 검색 결과 ${scored.length}건</div>`;
  wrap.appendChild(grid);
}
function resetCommSearch() {
  const books = _allCommBooks.length ? _allCommBooks : lsGet('recs_'+state.type, []);
  renderCommunity(books);
}

async function handleHeart(btn) {
  const hk=btn.dataset.hk;
  const hearted=btn.classList.contains('hearted');
  const countEl=btn.querySelector('.hcnt');
  const count=parseInt(countEl.textContent)||0;
  btn.disabled=true;
  recordParticipation(state.type);
  try {
    let nowHearted;
    if(btn.dataset.src==='user'&&btn.dataset.doc) {
      nowHearted=await toggleRecHeart(btn.dataset.type,btn.dataset.doc,hearted);
    } else {
      nowHearted=!hearted;
      lsSet(hk,nowHearted);
      if(btn.dataset.src==='curated'){
        const ck='htc_'+hk.slice(3);
        lsSet(ck,Math.max(0,lsGet(ck,0)+(nowHearted?1:-1)));
      }
    }
    btn.classList.toggle('hearted',nowHearted);
    const newCount = nowHearted ? count+1 : Math.max(0,count-1);
    btn.innerHTML=`${nowHearted?'❤️':'🤍'}<span class="hcnt">${newCount}</span>`;
    const statEl=document.getElementById('statHearts');
    if(statEl){
      const commBooks = lsGet('recs_'+state.type, []);
      statEl.textContent = calcTotalHearts(state.type, commBooks);
    }
  } finally { btn.disabled=false; }
}

let _srchBooks=[], _srchPage=0, _srchFilter='all', _srchQuery='';
const SRCH_PER_PAGE=5;

const FILTER_LABELS = {all:'전체', title:'제목', author:'저자', publisher:'출판사'};

function updateSearchPlaceholder() {
  const filter = document.getElementById('srchFilter')?.value || 'all';
  const ph = {all:'책 제목, 저자, 출판사 검색', title:'책 제목으로 검색', author:'저자명으로 검색', publisher:'출판사명으로 검색'};
  const input = document.getElementById('srchInput');
  if (input) input.placeholder = ph[filter] || ph.all;
}

async function doSearch() {
  const q=document.getElementById('srchInput')?.value.trim();
  const filter=document.getElementById('srchFilter')?.value||'all';
  if(!q)return;
  const res=document.getElementById('srchResults');
  res.innerHTML='<div class="loader"><span></span><span></span><span></span></div>';
  _srchFilter=filter;
  _srchQuery=q;
  window._lastSearchErr='';
  try {
    _srchBooks=await searchBooks(q, filter);
  } catch(e) {
    _srchBooks=[];
    window._lastSearchErr=e.message;
  }
  _srchPage=0;
  renderSearchPage();
}

function renderSearchPage() {
  const res=document.getElementById('srchResults');
  res.innerHTML='';
  if(!_srchBooks.length){
    const errDetail = window._lastSearchErr ? ` (오류: ${window._lastSearchErr})` : '';
    res.innerHTML=`<p style="text-align:center;color:#aaa;padding:20px">검색 결과가 없습니다.${errDetail}</p>`;
    return;
  }
  const total=_srchBooks.length;
  const totalPages=Math.ceil(total/SRCH_PER_PAGE);
  const start=_srchPage*SRCH_PER_PAGE;
  const pageBooks=_srchBooks.slice(start,start+SRCH_PER_PAGE);

  // 결과 수 표시
  const info=document.createElement('p');
  info.style.cssText='font-size:.8rem;color:#888;margin-bottom:10px';
  const filterLabel = FILTER_LABELS[_srchFilter] || '전체';
  info.textContent=`"${_srchQuery}" ${filterLabel} 검색 결과 ${total}건 중 ${start+1}–${Math.min(start+SRCH_PER_PAGE,total)}건`;
  res.appendChild(info);

async function _loadDesc(b) {
  const el = document.getElementById('descText');
  if (!el) return;
  const q = (b.title||'') + ' ' + (b.author||'');

  /* 1순위: Aladin ItemLookUp (ISBN) */
  let desc = '';
  if (b.isbn) desc = await _aladinDescByIsbn(b.isbn);

  /* 2순위: Aladin ItemSearch (키워드) */
  if (!desc) desc = await _aladinDescByQuery(q);

  /* 3순위: Google Books */
  if (!desc) {
    try {
      const r = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&langRestrict=ko&maxResults=3`);
      const d = await r.json();
      for (const item of (d.items||[])) {
        const t = item.volumeInfo?.description;
        if (t && t.length > 30) { desc = t; break; }
      }
    } catch {}
  }

  if (!el.isConnected) return;
  el.textContent = desc ? desc.slice(0,500)+(desc.length>500?'…':'') : '책 소개 정보가 없습니다.';
}

function _aladinDescByIsbn(isbn) {
  return new Promise(resolve => {
    const cb = '_adi_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    const s = document.createElement('script');
    const t = setTimeout(()=>{ resolve(''); s.remove(); try{delete window[cb];}catch{} }, 5000);
    window[cb] = data => {
      clearTimeout(t); s.remove(); try{delete window[cb];}catch{}
      resolve(data?.item?.[0]?.description||'');
    };
    s.onerror = ()=>{ clearTimeout(t); resolve(''); try{delete window[cb];}catch{} };
    s.src = `https://www.aladin.co.kr/ttb/api/ItemLookUp.aspx?ttbkey=${ALADIN_KEY}&itemIdType=ISBN13&ItemId=${isbn}&output=js&Version=20131101&OptResult=description&CallBack=${cb}`;
    document.head.appendChild(s);
  });
}

function _aladinDescByQuery(q) {
  return new Promise(resolve => {
    const cb = '_adq_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    const s = document.createElement('script');
    const t = setTimeout(()=>{ resolve(''); s.remove(); try{delete window[cb];}catch{} }, 5000);
    window[cb] = data => {
      clearTimeout(t); s.remove(); try{delete window[cb];}catch{}
      resolve(data?.item?.[0]?.description||'');
    };
    s.onerror = ()=>{ clearTimeout(t); resolve(''); try{delete window[cb];}catch{} };
    s.src = `https://www.aladin.co.kr/ttb/api/ItemSearch.aspx?ttbkey=${ALADIN_KEY}&Query=${encodeURIComponent(q)}&QueryType=Keyword&MaxResults=1&start=1&SearchTarget=Book&output=js&Version=20131101&CallBack=${cb}`;
    document.head.appendChild(s);
  });
}

function _loadImgEl(src){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>res(img);
    img.onerror=()=>rej(new Error('img load fail'));
    img.src=src;
  });
}

function _roundRectPath(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function _wrapText(ctx,text,x,y,maxW,lineH){
  let line='';
  for(let n=0;n<text.length;n++){
    const t=line+text[n];
    if(ctx.measureText(t).width>maxW&&n>0){ctx.fillText(line,x,y);line=text[n];y+=lineH;}
    else line=t;
  }
  ctx.fillText(line,x,y);
  return y;
}

async function composeNecut(){
  document.getElementById('photoPreview').style.display='none';
  const d=MBTI_DATA[state.type];
  const SZ=800,CELL=SZ/2,HDR=80,FTR=70;
  const canvas=document.getElementById('photoCanvas');
  canvas.width=SZ; canvas.height=SZ+HDR+FTR;
  const ctx=canvas.getContext('2d');

  ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,canvas.width,canvas.height);

  // header
  ctx.fillStyle=d.color; ctx.fillRect(0,0,SZ,HDR);
  ctx.fillStyle='#fff';
  ctx.font='bold 26px "Noto Sans KR",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(`${d.emoji} ${state.type} ${d.name}`,SZ/2,HDR/2);

  const positions=[{x:0,y:HDR},{x:CELL,y:HDR},{x:0,y:HDR+CELL},{x:CELL,y:HDR+CELL}];
  for(let i=0;i<4;i++){
    const {x,y}=positions[i];
    const src=window._necutPhotos[i];
    if(src){
      try{
        const img=await _loadImgEl(src);
        ctx.save();
        _roundRectPath(ctx,x+4,y+4,CELL-8,CELL-8,10);
        ctx.clip();
        const ratio=Math.max(CELL/img.width,CELL/img.height);
        const dw=img.width*ratio,dh=img.height*ratio;
        ctx.drawImage(img,x+(CELL-dw)/2,y+(CELL-dh)/2,dw,dh);
        ctx.restore();
      }catch{
        const meta=window._necutSlotMeta[i];
        if(meta?.type==='book'){
          ctx.fillStyle='#F5F0FF';
          _roundRectPath(ctx,x+4,y+4,CELL-8,CELL-8,10); ctx.fill();
          ctx.font='38px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('📚',x+CELL/2,y+CELL/2-22);
          ctx.fillStyle=d.color; ctx.font='bold 13px "Noto Sans KR",sans-serif';
          _wrapText(ctx,(meta.title||'').slice(0,16),x+CELL/2,y+CELL/2+16,CELL-24,18);
        } else {
          ctx.fillStyle='#333';
          _roundRectPath(ctx,x+4,y+4,CELL-8,CELL-8,10); ctx.fill();
          ctx.fillStyle='#888'; ctx.font='48px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('📷',x+CELL/2,y+CELL/2);
        }
      }
    } else {
      ctx.fillStyle='#2a2a2a';
      _roundRectPath(ctx,x+4,y+4,CELL-8,CELL-8,10); ctx.fill();
      ctx.fillStyle='#555'; ctx.font='44px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('📷',x+CELL/2,y+CELL/2);
      ctx.fillStyle='#444'; ctx.font='16px "Noto Sans KR",sans-serif';
      ctx.fillText('사진 '+(i+1),x+CELL/2,y+CELL/2+48);
    }
  }

  // dividers
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=8;
  ctx.beginPath(); ctx.moveTo(CELL,HDR); ctx.lineTo(CELL,HDR+SZ); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,HDR+CELL); ctx.lineTo(SZ,HDR+CELL); ctx.stroke();

  // footer
  ctx.fillStyle=d.color; ctx.fillRect(0,HDR+SZ,SZ,FTR);
  ctx.fillStyle='#fff'; ctx.font='bold 17px "Noto Sans KR",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('MBTI Book Talk 📚',SZ/2,HDR+SZ+FTR/2);

  document.getElementById('photoPreview').style.display='block';
  document.getElementById('photoPreview').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function downloadComposed(){
  const canvas=document.getElementById('photoCanvas');
  try{
    const a=document.createElement('a');
    a.download=`MBTI_${state.type}_네컷.jpg`;
    a.href=canvas.toDataURL('image/jpeg',0.92);
    a.click();
  }catch{
    showToast('보안 정책으로 저장이 제한됩니다. 스크린샷을 이용해주세요 📱');
  }
}

function shareComposed(){
  const canvas=document.getElementById('photoCanvas');
  if(navigator.share && canvas.toBlob){
    canvas.toBlob(blob=>{
      if(!blob){downloadComposed();return;}
      const file=new File([blob],`MBTI_${state.type}.jpg`,{type:'image/jpeg'});
      navigator.share({title:`MBTI Book Talk — ${state.type}`,files:[file]})
        .then(()=>showToast('공유했어요! 📸'))
        .catch(()=>downloadComposed());
    },'image/jpeg',0.92);
  } else {
    downloadComposed();
    showToast('이미지를 저장했어요! 직접 공유해 주세요 📸');
  }
}

/* ══════════════════════════════════════════
   INIT
   ══════════════════════════════════════════ */
state.type=lsGet('myMBTI','INTJ');
_backfillParticipants();
startOnlineTracker();
renderPage();
</script>
